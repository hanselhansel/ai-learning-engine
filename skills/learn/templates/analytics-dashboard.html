<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; padding: 24px;
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 28px; font-weight: 700; color: #f8fafc; }
        .header .subtitle { color: #94a3b8; margin-top: 4px; }
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: #1e293b; border-radius: 12px; padding: 20px;
            border: 1px solid #334155;
        }
        .stat-card .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #f8fafc; margin-top: 4px; }
        .stat-card .delta { font-size: 14px; margin-top: 2px; }
        .delta.up { color: #4ade80; }
        .delta.down { color: #f87171; }
        .delta.neutral { color: #94a3b8; }
        .charts-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 24px; margin-bottom: 32px;
        }
        .chart-card {
            background: #1e293b; border-radius: 12px; padding: 24px;
            border: 1px solid #334155;
        }
        .chart-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #f8fafc; }
        canvas { max-height: 300px; }
        .footer { text-align: center; color: #475569; font-size: 12px; margin-top: 32px; }
        .empty-state {
            display: flex; align-items: center; justify-content: center;
            height: 200px; color: #475569; font-size: 14px; font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="dashTitle">Learning Analytics</h1>
        <div class="subtitle" id="dashSubtitle"></div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Mastery Curve</h3>
            <canvas id="masteryChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Velocity Trend</h3>
            <canvas id="velocityChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Confidence Calibration</h3>
            <canvas id="confidenceChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Pre-Test &rarr; Post-Test Delta</h3>
            <canvas id="deltaChart"></canvas>
        </div>
        <div class="chart-card" id="articulationTrendCard">
            <h3>Articulation Trend</h3>
            <canvas id="articulationChart"></canvas>
        </div>
        <div class="chart-card" id="compressionCard">
            <h3>Compression Ratio</h3>
            <canvas id="compressionChart"></canvas>
        </div>
        <div class="chart-card" id="interviewChartCard">
            <h3>Interview Readiness</h3>
            <canvas id="interviewChart"></canvas>
        </div>
    </div>

    <div class="footer" id="dashFooter"></div>

    <script>
        // ===== DATA INJECTION POINT =====
        // The learning engine replaces this entire object with real session data.
        // All string values in this object MUST be escaped with JSON.stringify() during injection.
        const SESSION_DATA = {
            curriculum_name: "Spatial AI, World Models & Embodied Intelligence",
            date: "2026-03-20",
            sessions_completed: 4,
            target_sessions: 65,
            known_count: 0,
            known_pct: 0,
            streak: 1,
            streak_msg: "Keep it up!",
            avg_confidence: 0,
            velocity: 1.0,
            velocity_msg: "On pace",
            avg_articulation: 0,
            interview_readiness: { content: 0, articulation: 0, composite: 0 },
            // Per-session arrays (index = session number - 1)
            sessions: ["S1", "S2", "S3", "S4"],
            known_counts: [0, 0, 0, 0],
            learning_counts: [7, 19, 33, 33],
            velocity_data: [1.0, 1.0, 1.0, 1.0],
            calibrated_pct: [0, 0, 0, 0],
            overconfident_pct: [0, 0, 0, 0],
            underconfident_pct: [0, 0, 0, 0],
            pre_test_scores: [0, 0, 0, 0],
            post_test_scores: [0, 0, 0, 0],
            // Articulation data (may be empty array if no articulation sessions yet)
            articulation: {
                sessions: [],
                conciseness: [],
                persuasiveness: [],
                specificity: [],
                words_per_concept: [],
                interview_content: [],
                interview_articulation: []
            }
        };
        // ===== END DATA INJECTION =====

        // --- Helper: create element with properties ---
        function el(tag, props, children) {
            var e = document.createElement(tag);
            if (props) Object.keys(props).forEach(function(k) {
                if (k === 'className') e.className = props[k];
                else if (k === 'textContent') e.textContent = props[k];
                else if (k === 'cssText') e.style.cssText = props[k];
                else e.setAttribute(k, props[k]);
            });
            if (children) children.forEach(function(c) { if (c) e.appendChild(c); });
            return e;
        }

        // --- Header ---
        document.getElementById('dashTitle').textContent = SESSION_DATA.curriculum_name + ' Learning Analytics';
        document.getElementById('dashSubtitle').textContent =
            'Updated: ' + SESSION_DATA.date + ' | Session ' + SESSION_DATA.sessions_completed + ' of ' + SESSION_DATA.target_sessions;

        // --- Footer ---
        document.getElementById('dashFooter').textContent =
            'Generated by Learning Engine v4 | ' + SESSION_DATA.curriculum_name;

        // --- Stat Cards (built with DOM methods, no innerHTML) ---
        (function renderStats() {
            var d = SESSION_DATA;
            var ir = d.interview_readiness;
            var streakClass = d.streak >= 3 ? 'up' : d.streak >= 1 ? 'neutral' : 'down';
            var confClass = d.avg_confidence >= 70 ? 'up' : d.avg_confidence >= 40 ? 'neutral' : 'down';
            var velClass = d.velocity >= 1.0 ? 'up' : d.velocity >= 0.7 ? 'neutral' : 'down';
            var artClass = d.avg_articulation >= 60 ? 'up' : d.avg_articulation >= 30 ? 'neutral' : 'down';

            var cards = [
                { label: 'Sessions', value: String(d.sessions_completed), delta: 'of ' + d.target_sessions + ' planned', cls: 'neutral' },
                { label: 'Terms Mastered', value: String(d.known_count), delta: d.known_pct + '% of total', cls: 'up' },
                { label: 'Streak', value: d.streak + ' days', delta: d.streak_msg, cls: streakClass },
                { label: 'Avg Confidence', value: d.avg_confidence + '%', delta: 'calibration rate', cls: confClass },
                { label: 'Velocity', value: d.velocity + 'x', delta: d.velocity_msg, cls: velClass },
                { label: 'Avg Articulation', value: d.avg_articulation + '%', delta: 'across 3 dimensions', cls: artClass }
            ];

            var container = document.getElementById('statsRow');

            // Render standard stat cards
            cards.forEach(function(c) {
                container.appendChild(
                    el('div', { className: 'stat-card' }, [
                        el('div', { className: 'label', textContent: c.label }),
                        el('div', { className: 'value', textContent: c.value }),
                        el('div', { className: 'delta ' + c.cls, textContent: c.delta })
                    ])
                );
            });

            // Interview Readiness card (with dual bar)
            var irCard = el('div', { className: 'stat-card' }, [
                el('div', { className: 'label', textContent: 'Interview Readiness' }),
                el('div', { className: 'value', textContent: ir.composite + '%' }),
                el('div', { cssText: 'display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:8px' }, [
                    el('div', { cssText: 'width:' + ir.content + '%;background:#38bdf8' }),
                    el('div', { cssText: 'width:' + ir.articulation + '%;background:#fb923c' })
                ]),
                el('div', { cssText: 'display:flex;justify-content:space-between;font-size:11px;margin-top:2px' }, [
                    el('span', { cssText: 'color:#38bdf8', textContent: 'Content ' + ir.content + '%' }),
                    el('span', { cssText: 'color:#fb923c', textContent: 'Articulation ' + ir.articulation + '%' })
                ])
            ]);
            container.appendChild(irCard);
        })();

        // --- Chart Defaults ---
        var chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8' } } },
            scales: {
                x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#64748b' }, grid: { color: '#334155' } }
            }
        };

        // --- Mastery Curve (stacked area) ---
        new Chart(document.getElementById('masteryChart'), {
            type: 'line',
            data: {
                labels: SESSION_DATA.sessions,
                datasets: [
                    { label: 'Known', data: SESSION_DATA.known_counts, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', fill: true },
                    { label: 'Learning', data: SESSION_DATA.learning_counts, borderColor: '#facc15', backgroundColor: 'rgba(250,204,21,0.1)', fill: true }
                ]
            },
            options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, title: { display: false } } }
        });

        // --- Velocity Trend ---
        new Chart(document.getElementById('velocityChart'), {
            type: 'line',
            data: {
                labels: SESSION_DATA.sessions,
                datasets: [{
                    label: 'Velocity', data: SESSION_DATA.velocity_data,
                    borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.1)',
                    fill: true, tension: 0.3
                }]
            },
            options: {
                ...chartDefaults,
                scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, suggestedMin: 0, suggestedMax: 2 } }
            }
        });

        // --- Confidence Calibration (stacked bar) ---
        new Chart(document.getElementById('confidenceChart'), {
            type: 'bar',
            data: {
                labels: SESSION_DATA.sessions,
                datasets: [
                    { label: 'Calibrated', data: SESSION_DATA.calibrated_pct, backgroundColor: '#4ade80' },
                    { label: 'Overconfident', data: SESSION_DATA.overconfident_pct, backgroundColor: '#f87171' },
                    { label: 'Underconfident', data: SESSION_DATA.underconfident_pct, backgroundColor: '#facc15' }
                ]
            },
            options: { ...chartDefaults, scales: { ...chartDefaults.scales, x: { ...chartDefaults.scales.x, stacked: true }, y: { ...chartDefaults.scales.y, stacked: true, max: 100 } } }
        });

        // --- Pre/Post Delta ---
        new Chart(document.getElementById('deltaChart'), {
            type: 'bar',
            data: {
                labels: SESSION_DATA.sessions,
                datasets: [
                    { label: 'Pre-Test', data: SESSION_DATA.pre_test_scores, backgroundColor: '#64748b' },
                    { label: 'Post-Test', data: SESSION_DATA.post_test_scores, backgroundColor: '#38bdf8' }
                ]
            },
            options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, max: 100 } } }
        });

        // --- Articulation Charts (with empty state handling) ---
        var hasArticulation = SESSION_DATA.articulation.sessions.length > 0;

        function showEmptyState(canvasId) {
            var canvas = document.getElementById(canvasId);
            canvas.style.display = 'none';
            var emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state';
            emptyDiv.textContent = 'No articulation data yet';
            canvas.parentNode.appendChild(emptyDiv);
        }

        if (hasArticulation) {
            // --- Articulation Trend (3-line) ---
            new Chart(document.getElementById('articulationChart'), {
                type: 'line',
                data: {
                    labels: SESSION_DATA.articulation.sessions,
                    datasets: [
                        { label: 'Conciseness', data: SESSION_DATA.articulation.conciseness, borderColor: '#fb923c', backgroundColor: 'rgba(251,146,60,0.1)', fill: false, tension: 0.3 },
                        { label: 'Persuasiveness', data: SESSION_DATA.articulation.persuasiveness, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.1)', fill: false, tension: 0.3 },
                        { label: 'Specificity', data: SESSION_DATA.articulation.specificity, borderColor: '#22d3ee', backgroundColor: 'rgba(34,211,238,0.1)', fill: false, tension: 0.3 }
                    ]
                },
                options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, suggestedMin: 0, suggestedMax: 100 } } }
            });

            // --- Compression Ratio (words/concept) ---
            new Chart(document.getElementById('compressionChart'), {
                type: 'line',
                data: {
                    labels: SESSION_DATA.articulation.sessions,
                    datasets: [{
                        label: 'Words/Concept', data: SESSION_DATA.articulation.words_per_concept,
                        borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: { ...chartDefaults }
            });

            // --- Interview Readiness (stacked bar) ---
            new Chart(document.getElementById('interviewChart'), {
                type: 'bar',
                data: {
                    labels: SESSION_DATA.articulation.sessions,
                    datasets: [
                        { label: 'Content', data: SESSION_DATA.articulation.interview_content, backgroundColor: '#38bdf8' },
                        { label: 'Articulation', data: SESSION_DATA.articulation.interview_articulation, backgroundColor: '#fb923c' }
                    ]
                },
                options: { ...chartDefaults, scales: { ...chartDefaults.scales, x: { ...chartDefaults.scales.x, stacked: true }, y: { ...chartDefaults.scales.y, stacked: true, max: 100 } } }
            });
        } else {
            showEmptyState('articulationChart');
            showEmptyState('compressionChart');
            showEmptyState('interviewChart');
        }
    </script>
</body>
</html>
